<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najashi Abdullah | Growth Marketing Specialist</title>
    
    <!-- Futuristic Japanese Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            /* Futuristic Color Palette */
            --color-bg: #0a0e1a;
            --color-bg-secondary: #111827;
            --color-surface: rgba(255, 255, 255, 0.03);
            --color-surface-hover: rgba(255, 255, 255, 0.08);
            
            --color-primary: #00d9ff;
            --color-secondary: #ff006e;
            --color-accent: #7b2cbf;
            --color-success: #00ff88;
            
            --color-text: #ffffff;
            --color-text-secondary: #94a3b8;
            --color-text-muted: #64748b;
            
            /* Neon Glows */
            --glow-primary: 0 0 20px rgba(0, 217, 255, 0.3);
            --glow-secondary: 0 0 20px rgba(255, 0, 110, 0.3);
            --glow-accent: 0 0 30px rgba(123, 44, 191, 0.4);
            
            /* Typography */
            --font-display: 'Orbitron', 'Noto Sans JP', sans-serif;
            --font-body: 'Noto Sans JP', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            /* Effects */
            --glass: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
            
            /* Gradients */
            --gradient-cyber: linear-gradient(135deg, #00d9ff 0%, #7b2cbf 50%, #ff006e 100%);
            --gradient-holographic: linear-gradient(45deg, #00d9ff, #7b2cbf, #ff006e, #00ff88, #00d9ff);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }
        
        /* Animated Grid Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
            animation: gridMove 20s linear infinite;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        /* Gradient Orbs */
        .gradient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }
        
        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--color-primary) 0%, transparent 70%);
            top: -250px;
            right: -250px;
            animation-delay: 0s;
        }
        
        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--color-secondary) 0%, transparent 70%);
            bottom: -200px;
            left: -200px;
            animation-delay: 5s;
        }
        
        .orb-3 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--color-accent) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
        }
        
        /* Main Container */
        .app-container {
            position: relative;
            z-index: 1;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
        }
        
        /* Glassmorphic Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: var(--blur);
            border-bottom: var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        nav.scrolled {
            background: rgba(10, 14, 26, 0.95);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
        }
        
        .nav-logo {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            background: var(--gradient-cyber);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            position: relative;
        }
        
        .nav-logo::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gradient-cyber);
            border-radius: 2px;
        }
        
        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }
        
        .nav-links a {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 500;
            color: var(--color-text-secondary);
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            padding: 8px 0;
        }
        
        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-cyber);
            transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .nav-links a:hover {
            color: var(--color-primary);
            text-shadow: var(--glow-primary);
        }
        
        .nav-links a:hover::before {
            width: 100%;
        }
        
        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 100px;
            position: relative;
        }
        
        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }
        
        .hero-content {
            z-index: 2;
        }
        
        .hero-label {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--color-primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 24px;
            display: inline-block;
            padding: 8px 16px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid var(--color-primary);
            border-radius: 4px;
            box-shadow: var(--glow-primary);
        }
        
        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(56px, 8vw, 120px);
            font-weight: 900;
            line-height: 0.95;
            margin-bottom: 32px;
            letter-spacing: -0.03em;
            background: var(--gradient-cyber);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            position: relative;
        }
        
        .hero-subtitle {
            font-size: clamp(18px, 2vw, 24px);
            color: var(--color-text-secondary);
            margin-bottom: 48px;
            line-height: 1.6;
            max-width: 600px;
        }
        
        .hero-stats {
            display: flex;
            gap: 48px;
            margin-bottom: 48px;
        }
        
        .stat-item {
            position: relative;
        }
        
        .stat-value {
            font-family: var(--font-display);
            font-size: 48px;
            font-weight: 900;
            background: var(--gradient-cyber);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .cta-group {
            display: flex;
            gap: 16px;
        }
        
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 36px;
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        
        .cta-button.primary {
            background: var(--gradient-cyber);
            color: white;
            box-shadow: var(--glow-primary);
        }
        
        .cta-button.primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        
        .cta-button.primary:hover::before {
            left: 100%;
        }
        
        .cta-button.primary:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.5);
        }
        
        .cta-button.secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--color-text);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: var(--blur);
        }
        
        .cta-button.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--color-primary);
            box-shadow: var(--glow-primary);
            transform: translateY(-4px);
        }
        
        /* Hero Visual */
        .hero-visual {
            position: relative;
            height: 600px;
        }
        
        .floating-card {
            position: absolute;
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .floating-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
            border-color: var(--color-primary);
        }
        
        .card-1 {
            top: 0;
            right: 0;
            width: 280px;
            animation: floatCard 6s ease-in-out infinite;
        }
        
        .card-2 {
            top: 200px;
            left: 0;
            width: 250px;
            animation: floatCard 8s ease-in-out infinite;
            animation-delay: 2s;
        }
        
        .card-3 {
            bottom: 50px;
            right: 50px;
            width: 300px;
            animation: floatCard 7s ease-in-out infinite;
            animation-delay: 4s;
        }
        
        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .card-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-cyber);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
            box-shadow: var(--glow-primary);
        }
        
        .card-title {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--color-text);
        }
        
        .card-text {
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }
        
        /* Section Base */
        section {
            padding: 120px 0;
            position: relative;
        }
        
        .section-header {
            margin-bottom: 80px;
            text-align: center;
        }
        
        .section-label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--color-primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        
        .section-title {
            font-family: var(--font-display);
            font-size: clamp(36px, 5vw, 64px);
            font-weight: 900;
            background: var(--gradient-cyber);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }
        
        /* Glass Cards */
        .glass-card {
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-holographic);
            opacity: 0;
            transition: opacity 0.4s;
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .glass-card:hover::before {
            opacity: 0.05;
        }
        
        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border-color: var(--color-primary);
        }
        
        .card-content {
            position: relative;
            z-index: 1;
        }
        
        /* Experience Grid */
        .experience-grid {
            display: grid;
            gap: 32px;
        }
        
        .experience-card {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 40px;
        }
        
        .experience-meta {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .experience-period {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--color-primary);
            letter-spacing: 1px;
            padding: 8px 12px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid var(--color-primary);
            border-radius: 4px;
            display: inline-block;
            width: fit-content;
        }
        
        .experience-company {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
            color: var(--color-text);
        }
        
        .experience-location {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .experience-content h3 {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }
        
        .experience-content ul {
            list-style: none;
            padding: 0;
        }
        
        .experience-content li {
            position: relative;
            padding-left: 32px;
            margin-bottom: 16px;
            color: var(--color-text-secondary);
            line-height: 1.7;
        }
        
        .experience-content li::before {
            content: '▹';
            position: absolute;
            left: 0;
            color: var(--color-primary);
            font-size: 20px;
            line-height: 1.5;
        }
        
        /* Skills Grid */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }
        
        .skill-category h3 {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .skill-tag {
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 8px 16px;
            background: rgba(0, 217, 255, 0.1);
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
            border-radius: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .skill-tag:hover {
            background: var(--color-primary);
            color: var(--color-bg);
            transform: translateY(-2px);
            box-shadow: var(--glow-primary);
        }
        
        /* Contact Section */
        .contact-content {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .contact-content p {
            font-size: 20px;
            color: var(--color-text-secondary);
            margin-bottom: 48px;
            line-height: 1.7;
        }
        
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-top: 48px;
        }
        
        .contact-card {
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: var(--glass-border);
            border-radius: 16px;
            padding: 32px;
            text-decoration: none;
            color: var(--color-text);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        
        .contact-card:hover {
            border-color: var(--color-primary);
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        
        .contact-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient-cyber);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: var(--glow-primary);
        }
        
        .contact-label {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Footer */
        footer {
            padding: 60px 0;
            border-top: var(--glass-border);
            text-align: center;
        }
        
        footer p {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--color-text-muted);
            letter-spacing: 1px;
        }
        
        /* Scroll Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
        
        /* Responsive */
        @media (max-width: 968px) {
            .hero-grid {
                grid-template-columns: 1fr;
                gap: 60px;
            }
            
            .hero-visual {
                display: none;
            }
            
            .experience-card {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            
            .nav-links {
                display: none;
            }
            
            .hero-stats {
                gap: 32px;
            }
            
            .cta-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Background Orbs -->
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
    
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        function App() {
            const [scrolled, setScrolled] = useState(false);
            
            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                };
                
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            
            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };
            
            const experiences = [

                {

                        "Partnered with 97.9 The Beat to expand audience reach and increase brand visibility"
                    ]
                },
                {
                    period: "Summer 2023",

                    location: "Dallas, TX",
                    role: "Campaign Marketing",
                    responsibilities: [
                        "Directed and edited campaign visuals for Nike Women's 'Support Her Sole' initiative",
                        "Contributed creative assets aligned with brand storytelling and community engagement goals",
                        "Supported digital campaign amplification through social-first content"
                    ]
                }
            ];
            
            const skills = [
                {
                    category: "Growth Marketing",
                    items: ["Social Media Acquisition", "Audience Expansion", "Campaign Development", "Brand Awareness", "Community Building"]
                },
                {
                    category: "Content Strategy",

                },
                {
                    category: "Analytics & Data",

                },
                {
                    category: "Production",
                    items: ["Video Editing", "Podcast Production", "Short-Form Content", "Creative Direction"]
                }
            ];
